services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: trading-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading"]
      interval: 2s
      timeout: 3s
      retries: 15

  bot:
    build: .
    container_name: trading-bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://trading:${POSTGRES_PASSWORD:-trading_dev}@db:5432/trading
    volumes:
      - ./config:/app/config:ro
    env_file:
      - .env

volumes:
  pgdata:
